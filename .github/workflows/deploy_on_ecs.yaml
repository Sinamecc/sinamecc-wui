name: Deploy on ECS
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (development, production)'
        required: true
        default: 'development'
        type: choice
        options:
          - dev
          - prod

jobs:
  register-images:
    name: 'Register Images into ECR'
    uses: ./.github/workflows/build-and-push-images.yml
    with:
      environment: ${{ github.event.inputs.environment }}
